<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>宇宙誓印覺醒工程·七印誓網</title>
<style>
/* ===== 全域重置與基礎 ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #D4AF37;
  --gold-light: #F0D060;
  --gold-dim: #8B7020;
  --purple-deep: #1A0A2E;
  --purple-mid: #2D1B5E;
  --purple-light: #4A2A8A;
  --purple-glow: #6B3FA0;
  --white: #F5F0FF;
  --white-dim: rgba(245,240,255,0.7);
  --cyan: #00E5FF;
  --red-err: #FF4444;
  --green-ok: #44FF88;
  --font-main: 'Noto Serif TC', 'Noto Serif CJK TC', serif;
  --font-mono: 'Courier New', monospace;
  --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--purple-deep);
  color: var(--white);
  font-family: var(--font-main);
  font-size: 15px;
  line-height: 1.7;
}
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700;900&display=swap');

/* ===== 星空粒子畫布 ===== */
#cosmos-canvas {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0; pointer-events: none;
}

/* ===== 主容器 ===== */
#app {
  position: relative; z-index: 1;
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* ===== 通用工具 ===== */
.hidden { display: none !important; }
.flex-center { display: flex; align-items: center; justify-content: center; }
.flex-col { flex-direction: column; }
.text-center { text-align: center; }
.gold { color: var(--gold); }
.gold-light { color: var(--gold-light); }
.cyan { color: var(--cyan); }
.green { color: var(--green-ok); }
.red { color: var(--red-err); }

/* ===== 金色光暈邊框 ===== */
.gold-border {
  border: 1px solid var(--gold-dim);
  box-shadow: 0 0 12px rgba(212,175,55,0.2), inset 0 0 8px rgba(212,175,55,0.05);
}
.gold-border-glow {
  border: 1px solid var(--gold);
  box-shadow: 0 0 20px rgba(212,175,55,0.5), inset 0 0 15px rgba(212,175,55,0.1);
}

/* ===== 按鈕系統 ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px;
  padding: 12px 24px;
  border: none; border-radius: 4px;
  font-family: var(--font-main); font-size: 15px; font-weight: 500;
  cursor: pointer; transition: var(--transition);
  position: relative; overflow: hidden;
  letter-spacing: 1px;
}
.btn::before {
  content: ''; position: absolute; top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  transition: left 0.5s;
}
.btn:hover::before { left: 100%; }
.btn:active { transform: scale(0.97); }

.btn-gold {
  background: linear-gradient(135deg, #8B7020, #D4AF37, #F0D060, #D4AF37, #8B7020);
  background-size: 200% 200%;
  color: var(--purple-deep);
  font-weight: 700;
  animation: goldShimmer 3s ease infinite;
}
.btn-gold:hover {
  box-shadow: 0 0 25px rgba(212,175,55,0.7);
  transform: translateY(-2px);
}
@keyframes goldShimmer {
  0%,100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.btn-outline {
  background: transparent;
  border: 1px solid var(--gold);
  color: var(--gold);
}
.btn-outline:hover {
  background: rgba(212,175,55,0.1);
  box-shadow: 0 0 15px rgba(212,175,55,0.4);
}

.btn-purple {
  background: linear-gradient(135deg, var(--purple-mid), var(--purple-light));
  border: 1px solid var(--purple-glow);
  color: var(--white);
}
.btn-purple:hover {
  box-shadow: 0 0 20px rgba(107,63,160,0.6);
}

.btn-sm { padding: 8px 16px; font-size: 13px; }
.btn-lg { padding: 16px 36px; font-size: 17px; }
.btn-full { width: 100%; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn:disabled:hover { transform: none; box-shadow: none; }

/* ===== 輸入框 ===== */
.input-field {
  width: 100%;
  padding: 12px 16px;
  background: rgba(45,27,94,0.6);
  border: 1px solid var(--gold-dim);
  border-radius: 4px;
  color: var(--white);
  font-family: var(--font-main); font-size: 14px;
  outline: none; transition: var(--transition);
  letter-spacing: 1px;
}
.input-field:focus {
  border-color: var(--gold);
  box-shadow: 0 0 15px rgba(212,175,55,0.3);
  background: rgba(45,27,94,0.8);
}
.input-field::placeholder { color: rgba(212,175,55,0.4); }

/* ===== 卡片 ===== */
.card {
  background: rgba(26,10,46,0.85);
  backdrop-filter: blur(12px);
  border-radius: 8px;
  padding: 20px;
}

/* ===== 分隔線 ===== */
.divider {
  width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  margin: 16px 0;
}
.divider-glow {
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  box-shadow: 0 0 8px rgba(212,175,55,0.5);
}

/* ===== 標題裝飾 ===== */
.title-deco {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 8px;
}
.title-deco::before, .title-deco::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim));
}
.title-deco::after {
  background: linear-gradient(90deg, var(--gold-dim), transparent);
}

/* ===== 徽章/標籤 ===== */
.badge {
  display: inline-flex; align-items: center;
  padding: 3px 10px; border-radius: 20px;
  font-size: 12px; font-weight: 500; letter-spacing: 1px;
}
.badge-gold { background: rgba(212,175,55,0.15); border: 1px solid var(--gold-dim); color: var(--gold); }
.badge-green { background: rgba(68,255,136,0.1); border: 1px solid rgba(68,255,136,0.4); color: var(--green-ok); }
.badge-red { background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.4); color: var(--red-err); }
.badge-cyan { background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.4); color: var(--cyan); }
.badge-gray { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: var(--white-dim); }

/* ===== 滾動容器 ===== */
.scroll-area {
  overflow-y: auto; overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: var(--gold-dim) transparent;
}
.scroll-area::-webkit-scrollbar { width: 4px; }
.scroll-area::-webkit-scrollbar-track { background: transparent; }
.scroll-area::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

/* ===== 脈衝動畫 ===== */
@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.5; }
}
@keyframes pulseGlow {
  0%,100% { box-shadow: 0 0 10px rgba(212,175,55,0.3); }
  50% { box-shadow: 0 0 25px rgba(212,175,55,0.8), 0 0 50px rgba(212,175,55,0.3); }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes slideInRight {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes rotateSlow {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
@keyframes scanLine {
  0% { top: 0%; }
  100% { top: 100%; }
}
@keyframes typewriter {
  from { width: 0; }
  to { width: 100%; }
}
@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0; }
}

/* ===== 載入動畫 ===== */
.spinner {
  width: 40px; height: 40px;
  border: 2px solid rgba(212,175,55,0.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: rotateSlow 0.8s linear infinite;
}

/* ===== 進度條 ===== */
.progress-bar-wrap {
  width: 100%; height: 6px;
  background: rgba(212,175,55,0.1);
  border-radius: 3px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-light));
  border-radius: 3px;
  transition: width 0.8s ease;
  box-shadow: 0 0 8px rgba(212,175,55,0.5);
}

/* ===== 通知提示 ===== */
#toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(26,10,46,0.95);
  border: 1px solid var(--gold);
  border-radius: 6px;
  padding: 10px 20px;
  font-size: 14px; color: var(--gold);
  z-index: 9999;
  opacity: 0; transition: all 0.3s;
  pointer-events: none;
  white-space: nowrap;
  box-shadow: 0 0 20px rgba(212,175,55,0.4);
}
#toast.show {
  opacity: 1; transform: translateX(-50%) translateY(0);
}

/* ===== 模態框 ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(10,5,20,0.85);
  backdrop-filter: blur(6px);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
  animation: fadeIn 0.3s ease;
}
.modal-box {
  background: linear-gradient(145deg, var(--purple-deep), var(--purple-mid));
  border: 1px solid var(--gold);
  border-radius: 12px;
  padding: 28px 24px;
  max-width: 420px; width: 100%;
  box-shadow: 0 0 40px rgba(212,175,55,0.3);
  animation: fadeInUp 0.4s ease;
  max-height: 80vh;
  overflow-y: auto;
}
.modal-title {
  font-size: 18px; font-weight: 700;
  color: var(--gold); text-align: center;
  margin-bottom: 16px;
  letter-spacing: 2px;
}

/* ===== 掃描動畫框 ===== */
.scan-frame {
  position: relative;
  width: 200px; height: 200px;
  border: 2px solid var(--gold);
  border-radius: 8px;
  overflow: hidden;
  margin: 0 auto;
  box-shadow: 0 0 20px rgba(212,175,55,0.4);
}
.scan-frame::before, .scan-frame::after {
  content: ''; position: absolute;
  width: 20px; height: 20px;
  border-color: var(--gold-light);
  border-style: solid;
}
.scan-frame::before { top: -1px; left: -1px; border-width: 3px 0 0 3px; }
.scan-frame::after { bottom: -1px; right: -1px; border-width: 0 3px 3px 0; }
.scan-line {
  position: absolute; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  box-shadow: 0 0 10px var(--gold);
  animation: scanLine 2s linear infinite;
}
.scan-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: rgba(26,10,46,0.8);
  color: var(--gold-dim); font-size: 13px; text-align: center;
  padding: 20px;
}

/* ===== 符文裝飾 ===== */
.rune-deco {
  font-size: 24px; color: var(--gold-dim);
  animation: pulse 3s ease infinite;
  letter-spacing: 8px;
}

/* ===== 狀態指示燈 ===== */
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
}
.status-dot.active { background: var(--green-ok); box-shadow: 0 0 6px var(--green-ok); animation: pulse 2s infinite; }
.status-dot.inactive { background: var(--red-err); }
.status-dot.pending { background: var(--gold); animation: pulse 1.5s infinite; }

/* ===== 六芒星裝飾 ===== */
.hexagram {
  display: inline-block;
  position: relative;
  width: 60px; height: 60px;
  animation: rotateSlow 20s linear infinite;
}

/* ===== 響應式行動裝置 ===== */
@media (max-width: 480px) {
  .btn-lg { padding: 14px 28px; font-size: 15px; }
  .modal-box { padding: 20px 16px; }
}
</style>
</head>
<body>

<!-- 星空粒子背景 -->
<canvas id="cosmos-canvas"></canvas>

<!-- Toast 通知 -->
<div id="toast"></div>

<!-- 主應用容器 -->
<div id="app">
  <!-- 第一階段：啟動流程 -->
  <div id="phase-launch" class="flex-center flex-col" style="flex:1; overflow:hidden;">
    <!-- 步驟容器 -->
    <div id="launch-steps" style="width:100%; height:100%; position:relative; overflow:hidden;"></div>
  </div>

  <!-- 第二階段：主系統 -->
  <div id="phase-main" class="hidden" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
    <!-- 頂部標題欄 -->
    <div id="main-header" style="
      padding: 12px 20px 10px;
      background: linear-gradient(180deg, rgba(26,10,46,0.98) 0%, rgba(26,10,46,0.85) 100%);
      border-bottom: 1px solid var(--gold-dim);
      flex-shrink: 0;
    ">
      <div style="text-align:center;">
        <div class="rune-deco" style="font-size:14px; letter-spacing:4px; margin-bottom:2px;">✦ ✧ ✦</div>
        <div style="font-size:13px; color:var(--gold); font-weight:700; letter-spacing:3px;">宇宙誓印覺醒工程</div>
        <div style="font-size:11px; color:var(--gold-dim); letter-spacing:2px;">七印誓網主系統</div>
      </div>
    </div>

    <!-- 頁籤內容區 -->
    <div id="tab-content" class="scroll-area" style="flex:1; overflow-y:auto; padding: 0;"></div>

    <!-- 底部導航 -->
    <div id="bottom-nav" style="
      display: flex;
      background: rgba(26,10,46,0.97);
      border-top: 1px solid var(--gold-dim);
      flex-shrink: 0;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    ">
    </div>
  </div>
</div>

<!-- 模態框容器 -->
<div id="modal-container"></div>

<script>
// ============================================================
// 星空粒子系統
// ============================================================
(function initCosmos() {
  const canvas = document.getElementById('cosmos-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [], nebulas = [], lines = [];
  const STAR_COUNT = 200;
  const NEBULA_COUNT = 5;
  const LINE_COUNT = 30;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function randomStar() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3,
      alpha: Math.random() * 0.8 + 0.2,
      speed: Math.random() * 0.3 + 0.05,
      twinkle: Math.random() * Math.PI * 2,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      color: Math.random() > 0.85 ? '#D4AF37' : Math.random() > 0.7 ? '#00E5FF' : '#F5F0FF'
    };
  }

  function randomNebula() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 150 + 80,
      alpha: Math.random() * 0.06 + 0.02,
      hue: Math.random() > 0.5 ? '107,63,160' : '212,175,55',
      drift: (Math.random() - 0.5) * 0.1
    };
  }

  function randomLine() {
    const x1 = Math.random() * W, y1 = Math.random() * H;
    const angle = Math.random() * Math.PI * 2;
    const len = Math.random() * 80 + 30;
    return {
      x1, y1,
      x2: x1 + Math.cos(angle) * len,
      y2: y1 + Math.sin(angle) * len,
      alpha: Math.random() * 0.15 + 0.03,
      pulse: Math.random() * Math.PI * 2,
      pulseSpeed: Math.random() * 0.01 + 0.003
    };
  }

  function init() {
    resize();
    stars = Array.from({length: STAR_COUNT}, randomStar);
    nebulas = Array.from({length: NEBULA_COUNT}, randomNebula);
    lines = Array.from({length: LINE_COUNT}, randomLine);
  }

  function draw(t) {
    ctx.clearRect(0, 0, W, H);

    // 深空漸層背景
    const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
    bg.addColorStop(0, 'rgba(42,20,80,0.4)');
    bg.addColorStop(0.5, 'rgba(26,10,46,0.3)');
    bg.addColorStop(1, 'rgba(10,5,20,0.5)');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // 星雲
    nebulas.forEach(n => {
      n.x += n.drift;
      if (n.x > W + n.r) n.x = -n.r;
      if (n.x < -n.r) n.x = W + n.r;
      const grad = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
      grad.addColorStop(0, `rgba(${n.hue},${n.alpha})`);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fill();
    });

    // 光網線條
    lines.forEach(l => {
      l.pulse += l.pulseSpeed;
      const a = l.alpha * (0.5 + 0.5 * Math.sin(l.pulse));
      ctx.strokeStyle = `rgba(212,175,55,${a})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(l.x1, l.y1);
      ctx.lineTo(l.x2, l.y2);
      ctx.stroke();
    });

    // 星星
    stars.forEach(s => {
      s.twinkle += s.twinkleSpeed;
      s.y -= s.speed * 0.1;
      if (s.y < -2) { s.y = H + 2; s.x = Math.random() * W; }
      const a = s.alpha * (0.6 + 0.4 * Math.sin(s.twinkle));
      ctx.fillStyle = s.color.replace(')', `,${a})`).replace('rgb', 'rgba').replace('#F5F0FF', `rgba(245,240,255,${a})`).replace('#D4AF37', `rgba(212,175,55,${a})`).replace('#00E5FF', `rgba(0,229,255,${a})`);

      // 簡化：直接用 fillStyle
      ctx.globalAlpha = a;
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();

      // 金色星星加光暈
      if (s.color === '#D4AF37' && s.r > 1) {
        ctx.globalAlpha = a * 0.3;
        ctx.fillStyle = '#D4AF37';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); nebulas = Array.from({length: NEBULA_COUNT}, randomNebula); });
  init();
  requestAnimationFrame(draw);
})();

// ============================================================
// 工具函數
// ============================================================
function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function showModal(html, onClose) {
  const container = document.getElementById('modal-container');
  container.innerHTML = `
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal-box">${html}</div>
    </div>`;
  if (onClose) {
    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target.id === 'modal-overlay') { closeModal(); if(onClose) onClose(); }
    });
  }
}

function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function animateIn(el, delay = 0) {
  el.style.opacity = '0';
  el.style.transform = 'translateY(16px)';
  setTimeout(() => {
    el.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
    el.style.opacity = '1';
    el.style.transform = 'translateY(0)';
  }, delay);
}

// ============================================================
// 應用狀態
// ============================================================
const AppState = {
  currentStep: 1,
  qrScanned: false,
  oathRead: false,
  isbnVerified: false,
  isbn: 'ISBN 978-988-9**10-1-1',
  userName: '誓印者',
  oathName: '光明誓魂',
  uid: 'SW-2024-0621-7777',
  currentTab: 0,
  sealStatus: ['passed', 'active', 'pending', 'pending', 'pending', 'pending', 'pending'],
  seals: [
    { name: '消業印', desc: '消除業障，清淨誓魂根基', num: '第一印' },
    { name: '修心印', desc: '修煉心性，強化誓魂意志', num: '第二印' },
    { name: '守願印', desc: '守護誓願，鞏固誓魂方向', num: '第三印' },
    { name: '誓令印', desc: '確立誓令，啟動誓魂使命', num: '第四印' },
    { name: '覺醒印', desc: '全面覺醒，誓魂本質顯化', num: '第五印' },
    { name: '誥徒誓印', desc: '誥授誓徒，傳承誓魂法脈', num: '第六印' },
    { name: '鳳徽印', desc: '圓印封冊，誓魂歸源完成', num: '第七印' }
  ]
};

// ============================================================
// 第一階段：啟動流程
// ============================================================
function renderLaunchPhase() {
  const container = document.getElementById('launch-steps');
  renderStep(AppState.currentStep, container);
}

function renderStep(step, container) {
  container.innerHTML = '';
  const stepFns = [null, renderStep1, renderStep2, renderStep3, renderStep4, renderStep5];
  if (stepFns[step]) stepFns[step](container);
}

function goToStep(n) {
  AppState.currentStep = n;
  renderStep(n, document.getElementById('launch-steps'));
}

function submitVerification() {
  const input = document.getElementById('isbn-input').value.trim();
  if (!input) {
    showToast('⚠ 請輸入購書序號');
    return;
  }
  AppState.isbn = input || 'ISBN 978-988-9**10-1-1';

  // 顯示驗證中動畫
  showModal(`
    <div style="text-align:center; padding:20px 0;">
      <div class="modal-title">◉ 母源印驗證中</div>
      <div style="display:flex; justify-content:center; margin:20px 0;">
        <div class="spinner" style="width:60px; height:60px;"></div>
      </div>
      <div style="font-size:13px; color:var(--white-dim); margin-bottom:8px;">正在進行誓印對頻驗證...</div>
      <div id="verify-progress" style="font-size:12px; color:var(--gold-dim);">連接主頻中...</div>
    </div>`);

  const msgs = ['連接主頻中...', '校驗母源印記...', '比對誓導碼...', '驗證購書序號...', '回傳驗證結果...'];
  let i = 0;
  const interval = setInterval(() => {
    const el = document.getElementById('verify-progress');
    if (el && i < msgs.length) el.textContent = msgs[i++];
    if (i >= msgs.length) {
      clearInterval(interval);
      setTimeout(() => {
        closeModal();
        AppState.isbnVerified = true;
        goToStep(4);
      }, 600);
    }
  }, 500);
}

async function startSync() {
  const btn = document.getElementById('start-sync-btn');
  btn.disabled = true;
  btn.textContent = '同步中...';

  const progressWrap = document.getElementById('progress-wrap');
  progressWrap.style.display = 'block';

  const steps = ['sync-1', 'sync-2', 'sync-3'];
  const icons = ['⚡', '✦', '◉'];
  const progress = [33, 66, 100];

  for (let i = 0; i < steps.length; i++) {
    const el = document.getElementById(steps[i]);
    const statusEl = el.querySelector('.sync-status');
    const iconEl = el.querySelector('.sync-icon');

    el.style.opacity = '1';
    iconEl.style.borderColor = 'var(--gold)';
    iconEl.style.color = 'var(--gold)';
    iconEl.style.boxShadow = '0 0 15px rgba(212,175,55,0.5)';
    statusEl.textContent = '⏳';

    // 更新進度條
    const progressBar = document.getElementById('sync-progress');
    const progressText = document.getElementById('progress-text');
    const startPct = i === 0 ? 0 : progress[i-1];
    const endPct = progress[i];
    let current = startPct;
    const step = (endPct - startPct) / 20;
    const progressInterval = setInterval(() => {
      current = Math.min(current + step, endPct);
      progressBar.style.width = current + '%';
      progressText.textContent = Math.round(current) + '%';
      if (current >= endPct) clearInterval(progressInterval);
    }, 50);

    await sleep(1500);
    statusEl.textContent = '✓';
    statusEl.style.color = 'var(--green-ok)';
    iconEl.textContent = icons[i];

    const line = document.getElementById('sync-line-' + (i+1));
    if (line) { line.style.opacity = '1'; line.style.background = 'var(--gold)'; }
  }

  await sleep(500);
  document.getElementById('sync-complete').style.display = 'block';
  btn.classList.add('hidden');
  document.getElementById('enter-main-btn').classList.remove('hidden');
}

function enterMainSystem() {
  document.getElementById('phase-launch').classList.add('hidden');
  const mainPhase = document.getElementById('phase-main');
  mainPhase.classList.remove('hidden');
  mainPhase.style.display = 'flex';
  renderMainSystem();
}

function toggleAccordion(i) {
  const content = document.getElementById(`accordion-content-${i}`);
  const arrow = document.getElementById(`accordion-arrow-${i}`);
  const isOpen = content.style.display !== 'none';
  content.style.display = isOpen ? 'none' : 'block';
  arrow.style.transform = isOpen ? '' : 'rotate(90deg)';
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('✓ 誓文已複製')).catch(() => showToast('複製失敗，請手動複製'));
}

function confirmLogout() {
  show
Modal(`
    <div>
      <div class="modal-title" style="color:var(--red-err);">⚠ 確認退出</div>
      <div class="divider"></div>
      <div style="font-size:14px; color:var(--white-dim); text-align:center; margin:16px 0; line-height:1.8;">
        確定要退出七印誓網主系統嗎？<br>誓印記錄將保留，下次登入可繼續。
      </div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-outline" style="flex:1; border-color:var(--red-err); color:var(--red-err);" onclick="doLogout()">確認退出</button>
        <button class="btn btn-gold" style="flex:1;" onclick="closeModal()">取消</button>
      </div>
    </div>`, () => {});
}

function doLogout() {
  closeModal();
  document.getElementById('phase-main').classList.add('hidden');
  document.getElementById('phase-launch').classList.remove('hidden');
  document.getElementById('phase-launch').style.display = 'flex';
  AppState.currentStep = 1;
  AppState.qrScanned = false;
  AppState.oathRead = false;
  AppState.isbnVerified = false;
  renderLaunchPhase();
  showToast('已退出系統');
}
